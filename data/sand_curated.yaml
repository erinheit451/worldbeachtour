# Curated sand showcase seeds.
# Stories grounded in published geology; citations are Wikipedia or peer-reviewed.
# showcase_rank 1 = most distinctive/iconic. Lower is better.
# Reference photos are LINKED ONLY (not rehosted). Attribution required.

- slug: papakolea-beach
  showcase_rank: 1
  sand_story: >-
    Papakolea is one of only four green-sand beaches on Earth. The color comes
    from olivine crystals — a silicate of iron and magnesium — eroded out of the
    nearby Puu Mahana cinder cone. Olivine is denser than the surrounding
    basaltic ash, so it accumulates here instead of being washed out to sea.
  citations:
    - https://en.wikipedia.org/wiki/Papak%C5%8Dlea_Beach
    - https://pubs.usgs.gov/publication/70045583
  reference_photo_url: https://commons.wikimedia.org/wiki/File:Green_Sand_Beach_-_panoramio.jpg
  reference_photo_attribution: Wikimedia Commons, CC BY-SA

- slug: punalu-u-black-sand-beach
  showcase_rank: 2
  sand_story: >-
    Punalu'u's jet-black sand is ground basalt, formed when molten lava entering
    the Pacific shattered into fine fragments through thermal shock. Unlike the
    quartz-rich beaches of the mainland, none of this sand comes from rivers —
    it is all freshly minted volcanic rock.
  citations:
    - https://en.wikipedia.org/wiki/Punalu%CA%BBu_Beach
  reference_photo_url: https://commons.wikimedia.org/wiki/File:Punaluu_Black_Sand_Beach.jpg

- slug: reynisfjara
  showcase_rank: 3
  sand_story: >-
    Reynisfjara's pitch-black sand is fragmented basalt from the Katla volcanic
    system, deposited by the turbulent North Atlantic. The beach is backed by
    columnar basalt cliffs where rapid cooling of thick lava produced regular
    hexagonal joints.
  citations:
    - https://en.wikipedia.org/wiki/Reynisfjara

- slug: glass-beach-4
  showcase_rank: 4
  sand_story: >-
    Decades of municipal dumping at Fort Bragg produced the world's most famous
    glass beach. Relentless Pacific surf has tumbled the broken bottles into
    rounded, frosted pebbles of green, brown, white, and rare blue. The glass
    is gradually being worn away and the beach is no longer self-replenishing.
  citations:
    - https://en.wikipedia.org/wiki/Glass_Beach,_Fort_Bragg,_California

- slug: whitehaven-beach-1
  showcase_rank: 5
  sand_story: >-
    Whitehaven's sand is 98-99% pure silica — unusually fine quartz that
    reflects sunlight rather than absorbing it, keeping the sand cool in
    tropical heat. Geologists believe the deposit was transported by ancient
    currents from a source still not conclusively identified.
  citations:
    - https://en.wikipedia.org/wiki/Whitehaven_Beach

- slug: hyams-beach
  showcase_rank: 6
  sand_story: >-
    Hyams Beach held a Guinness World Record for the whitest sand. The grains
    are high-purity quartz with minimal iron-oxide staining — a combination
    rarely found outside Australia's east coast, where the right bedrock,
    climate, and littoral transport converge.
  citations:
    - https://en.wikipedia.org/wiki/Hyams_Beach

- slug: kaihalulu-beach
  showcase_rank: 7
  sand_story: >-
    Kaihalulu's red sand comes from iron-rich cinders eroded from the crumbling
    cliff of Ka'uiki Head. The vivid brick-red color reflects oxidation of iron
    in the volcanic ash — essentially rust, frozen into the rock millennia ago
    and now returning to the sea.
  citations:
    - https://en.wikipedia.org/wiki/Kaihalulu_Beach

- slug: navagio-1
  showcase_rank: 8
  sand_story: >-
    Navagio's sand is pale limestone gravel and fine carbonate, the weathered
    remains of the Triassic limestone cliffs that enclose the cove. The sand is
    noticeably brighter than surrounding beaches because it contains almost no
    silicate minerals — only dissolved and re-precipitated calcium carbonate.
  citations:
    - https://en.wikipedia.org/wiki/Navagio

- slug: playa-de-gulpiyuri
  showcase_rank: 9
  sand_story: >-
    Gulpiyuri sits 100 metres inland, in a sinkhole fed by seawater through a
    karst tunnel. Its sand is pure shell carbonate, washed in with each tide
    through the limestone aquifer — a rare inland beach that breathes with the
    Cantabrian Sea.
  citations:
    - https://en.wikipedia.org/wiki/Gulpiyuri_Beach

- slug: shell-beach-19
  showcase_rank: 10
  sand_story: >-
    Guyana's Shell Beach is named not for decorative shells but for the immense
    bank of cockle and clam fragments that makes up its substrate. There is
    effectively no mineral sand — just millennia of molluscan carbonate,
    replenished by the Amazon's nutrient plume and deposited by coastal drift.
  citations:
    - https://en.wikipedia.org/wiki/Shell_Beach,_Guyana

- slug: porto-ferro-1
  showcase_rank: 11
  sand_story: >-
    Porto Ferro's orange-red sand is a mix of iron-oxide-rich quartz grains
    weathered from the surrounding Sardinian sandstone, combined with biogenic
    shell fragments. The combination produces a distinct rust tone that
    deepens when the sand is wet.
  citations:
    - https://en.wikipedia.org/wiki/Porto_Ferro

- slug: ir-ramla-t-ghajn-tuffieha
  showcase_rank: 12
  sand_story: >-
    Malta's Ramla Bay has brick-red sand from weathered iron-rich sandstone
    of the Upper Coralline Limestone cap. It is the most-pigmented sand on
    the Maltese islands and exists only because the red-bed source rocks
    outcrop directly above this single bay.
  citations:
    - https://en.wikipedia.org/wiki/Ramla_Bay

- slug: cox-s-bazar-beach
  showcase_rank: 13
  sand_story: >-
    At 120 km, Cox's Bazar is often claimed as the longest natural sand beach
    on Earth. The sand is fine quartz sourced from the Ganges-Brahmaputra
    sediment system — the same Himalayan-erosion feedstock that builds most of
    Bangladesh's coastline.
  citations:
    - https://en.wikipedia.org/wiki/Cox%27s_Bazar

- slug: one-cable-beach
  showcase_rank: 14
  sand_story: >-
    Bahamian Cable Beach is almost entirely oolitic aragonite — tiny concentric
    spheres of calcium carbonate that precipitate directly from the warm,
    supersaturated Bahama Banks seawater. Walking on oolite feels unusually
    smooth because each grain is nearly a perfect sphere.
  citations:
    - https://en.wikipedia.org/wiki/Oolite

- slug: te-puia-hot-water-beach
  showcase_rank: 15
  sand_story: >-
    Hot Water Beach's sand is iron-rich titanomagnetite eroded from Coromandel's
    andesitic volcanoes. Geothermal water seeps up through the black sand at
    low tide, letting visitors dig private hot pools — a rare intersection of
    sand geology and active geothermal plumbing.
  citations:
    - https://en.wikipedia.org/wiki/Hot_Water_Beach

- slug: muriwai-beach
  showcase_rank: 16
  sand_story: >-
    Muriwai's black sand is titanomagnetite derived from the Taranaki volcanic
    province. The iron content is high enough that a magnet dragged through
    the sand comes out coated — and historically the beach has been mined for
    its iron-oxide content.
  citations:
    - https://en.wikipedia.org/wiki/Muriwai

- slug: durdle-door
  showcase_rank: 17
  sand_story: >-
    Durdle Door sits at the foot of the Jurassic Coast's Portland limestone
    arch. The beach pebbles are a cross-section of 150 million years of
    geology: Jurassic limestone, Wealden sandstone, and flint chalk that has
    weathered out of the Cretaceous cliffs overhead.
  citations:
    - https://en.wikipedia.org/wiki/Durdle_Door

- slug: etretat-plage
  showcase_rank: 18
  sand_story: >-
    Etretat's beach is pure white chalk-flint shingle. There is almost no sand
    at all — the beach is rounded pebbles of flint nodules eroded from the
    Cretaceous chalk cliffs, whose carbonate matrix dissolves in seawater
    leaving only the silica-rich flint behind.
  citations:
    - https://en.wikipedia.org/wiki/%C3%89tretat

- slug: matira-beach
  showcase_rank: 19
  sand_story: >-
    Matira's fine white sand is pulverised coral and foraminifera from the
    surrounding barrier reef — nearly pure calcium carbonate. Unlike
    quartz-beach sands, carbonate sand is slightly alkaline and dissolves
    over geologic time, making it a finite resource in reef systems.
  citations:
    - https://en.wikipedia.org/wiki/Matira_Beach

- slug: copacabana-7
  showcase_rank: 20
  sand_story: >-
    Copacabana's golden quartz sand was trucked in and renourished in the
    1970s as part of the beach's expansion to nearly 100 metres width. The
    native sand — finer, slightly greyer — still outcrops at the eastern end
    near the Forte de Copacabana, where the original shoreline is preserved.
  citations:
    - https://en.wikipedia.org/wiki/Copacabana,_Rio_de_Janeiro
